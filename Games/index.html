<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Game Room</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="dark light" />
    <link rel="manifest" href="../app.webmanifest" />
    <script defer src="../shared/pwa.js" data-sw="../sw.js"></script>
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%23155e4c%22/><text x=%2250%22 y=%2268%22 text-anchor=%22middle%22 font-size=%2254%22>🎲</text></svg>"
    />
    <link
      rel="apple-touch-icon"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%23155e4c%22/><text x=%2250%22 y=%2268%22 text-anchor=%22middle%22 font-size=%2254%22>🎲</text></svg>"
    />
    <style>
      :root {
        color-scheme: light;
        --bg: #f4efe5;
        --bg-soft: #d9e5dd;
        --ink: #13221b;
        --muted: #52655b;
        --line: rgba(19, 34, 27, 0.13);
        --panel: rgba(255, 252, 245, 0.86);
        --panel-strong: rgba(255, 255, 255, 0.96);
        --accent: #155e4c;
        --accent-soft: rgba(21, 94, 76, 0.12);
        --shadow: 0 18px 42px rgba(15, 23, 42, 0.11);
      }

      html.dark {
        color-scheme: dark;
        --bg: #07120f;
        --bg-soft: #102821;
        --ink: #eef8f2;
        --muted: #b7cbc1;
        --line: rgba(203, 213, 225, 0.14);
        --panel: rgba(8, 20, 17, 0.82);
        --panel-strong: rgba(13, 29, 24, 0.94);
        --accent: #57c6a8;
        --accent-soft: rgba(87, 198, 168, 0.16);
        --shadow: 0 20px 46px rgba(0, 0, 0, 0.28);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Avenir Next", Avenir, "Segoe UI", sans-serif;
        color: var(--ink);
        background: linear-gradient(180deg, var(--bg), var(--bg-soft));
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      button {
        font: inherit;
      }

      .page {
        width: min(980px, calc(100% - 2rem));
        margin: 0 auto;
        padding: 1.5rem 0 3rem;
      }

      .topbar,
      .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
      }

      .topbar {
        margin-bottom: 2.25rem;
      }

      .crumbs {
        display: inline-flex;
        align-items: center;
        gap: 0.65rem;
        color: var(--muted);
        font-size: 0.95rem;
      }

      .crumbs a {
        font-weight: 700;
      }

      .theme-toggle {
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 0.62rem 0.9rem;
        background: var(--panel);
        color: var(--ink);
        cursor: pointer;
      }

      .header {
        margin-bottom: 1rem;
      }

      h1 {
        margin: 0;
        font-size: clamp(2.15rem, 5vw, 3.8rem);
        line-height: 0.98;
      }

      .games-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 0.85rem;
      }

      .game-card {
        display: grid;
        grid-template-columns: auto 1fr;
        align-items: start;
        gap: 0.8rem;
        min-height: 6.75rem;
        padding: 1rem;
        border: 1px solid var(--line);
        border-radius: 16px;
        background: var(--panel);
        box-shadow: var(--shadow);
        transition:
          transform 0.16s ease,
          border-color 0.16s ease,
          background 0.16s ease;
      }

      .game-card:hover,
      .game-card:focus-visible {
        transform: translateY(-3px);
        border-color: rgba(21, 94, 76, 0.32);
        background: var(--panel-strong);
        outline: none;
      }

      html.dark .game-card:hover,
      html.dark .game-card:focus-visible {
        border-color: rgba(87, 198, 168, 0.36);
      }

      .game-icon {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 2.75rem;
        height: 2.75rem;
        border-radius: 12px;
        background: var(--accent-soft);
        font-size: 1.45rem;
      }

      .game-name {
        display: block;
        overflow-wrap: anywhere;
        font-size: 1.08rem;
        font-weight: 800;
        line-height: 1.15;
      }

      .game-desc {
        display: block;
        margin-top: 0.35rem;
        color: var(--muted);
        font-size: 0.88rem;
        line-height: 1.35;
      }

      @media (max-width: 860px) {
        .games-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (max-width: 640px) {
        .page {
          width: min(100% - 1rem, 980px);
          padding-top: 1rem;
        }

        .topbar,
        .header {
          align-items: stretch;
          flex-direction: column;
        }

        .theme-toggle {
          width: 100%;
        }

        .games-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <header class="topbar">
        <nav class="crumbs" aria-label="Breadcrumb">
          <a href="../index.html">Dashboard</a>
          <span>/</span>
          <span>Game Room</span>
        </nav>
        <button id="themeToggle" class="theme-toggle" type="button">
          Toggle Theme
        </button>
      </header>

      <main>
        <div class="header">
          <h1>Game Room</h1>
        </div>

        <div id="gamesGrid" class="games-grid" aria-label="Game apps"></div>
      </main>
    </div>

    <template id="gameCardTemplate">
      <a class="game-card" target="_self" rel="noopener">
        <span class="game-icon" aria-hidden="true"></span>
        <span>
          <span class="game-name"></span>
          <span class="game-desc"></span>
        </span>
      </a>
    </template>

    <script>
      const DASHBOARD_THEME_KEY = "dash.theme";
      const DASHBOARD_RECENTS_KEY = "dash.recentApps";
      const GAME_APPS = [
        {
          name: "Phase 10",
          href: "../Phase10/index.html",
          dashboardUrl: "./Phase10/index.html",
          icon: "🔟",
          desc: "Play Phase 10 against bots.",
        },
        {
          name: "SkyJo",
          href: "../SkyJo/index.html",
          dashboardUrl: "./SkyJo/index.html",
          icon: "🌤️",
          desc: "Build the lowest card total.",
        },
        {
          name: "Hearts",
          href: "../Hearts/index.html",
          dashboardUrl: "./Hearts/index.html",
          icon: "♥️",
          desc: "Avoid points and the queen.",
        },
        {
          name: "Spades",
          href: "../Spades/index.html",
          dashboardUrl: "./Spades/index.html",
          icon: "♠️",
          desc: "Bid tricks with a partner.",
        },
        {
          name: "Crazy 8s",
          href: "../Crazy8s/index.html",
          dashboardUrl: "./Crazy8s/index.html",
          icon: "8️⃣",
          desc: "Match suits, ranks, and wild eights.",
        },
        {
          name: "5 Crowns",
          href: "../FiveCrowns/index.html",
          dashboardUrl: "./FiveCrowns/index.html",
          icon: "👑",
          desc: "Make books and runs by round.",
        },
        {
          name: "ScoreKeeper",
          href: "../ScoreKeeper/index.html",
          dashboardUrl: "./ScoreKeeper/index.html",
          icon: "🧮",
          desc: "Track scores for game night.",
        },
      ];

      (function initTheme() {
        const userPref = localStorage.getItem(DASHBOARD_THEME_KEY);
        const prefersDark = window.matchMedia(
          "(prefers-color-scheme: dark)",
        ).matches;
        if (userPref ? userPref === "dark" : prefersDark) {
          document.documentElement.classList.add("dark");
        }
        document.getElementById("themeToggle").addEventListener("click", () => {
          document.documentElement.classList.toggle("dark");
          localStorage.setItem(
            DASHBOARD_THEME_KEY,
            document.documentElement.classList.contains("dark")
              ? "dark"
              : "light",
          );
        });
      })();

      function readJson(key, fallback) {
        try {
          const raw = localStorage.getItem(key);
          if (!raw) return fallback;
          const parsed = JSON.parse(raw);
          return parsed ?? fallback;
        } catch {
          return fallback;
        }
      }

      function writeJson(key, value) {
        try {
          localStorage.setItem(key, JSON.stringify(value));
        } catch {}
      }

      function trackVisit(url) {
        const next = [
          { url, ts: Date.now() },
          ...readJson(DASHBOARD_RECENTS_KEY, []).filter(
            (entry) => entry && entry.url !== url && Number.isFinite(Number(entry.ts)),
          ),
        ].slice(0, 6);
        writeJson(DASHBOARD_RECENTS_KEY, next);
      }

      function renderGames() {
        const grid = document.getElementById("gamesGrid");
        const template = document.getElementById("gameCardTemplate");

        for (const game of GAME_APPS) {
          const card = template.content.firstElementChild.cloneNode(true);
          card.href = game.href;
          card.dataset.dashboardUrl = game.dashboardUrl;
          card.querySelector(".game-icon").textContent = game.icon;
          card.querySelector(".game-name").textContent = game.name;
          card.querySelector(".game-desc").textContent = game.desc;
          grid.appendChild(card);
        }
      }

      renderGames();

      document.addEventListener("click", (event) => {
        const link = event.target.closest("[data-dashboard-url]");
        if (!(link instanceof HTMLAnchorElement)) return;
        const dashboardUrl = link.getAttribute("data-dashboard-url");
        if (!dashboardUrl) return;
        trackVisit(dashboardUrl);
      });
    </script>
  </body>
</html>
