<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dashboard Offline</title>
    <style>
      :root {
        --bg: #f4f7fb;
        --card: #ffffff;
        --text: #0f172a;
        --muted: #64748b;
        --line: #dbe3ef;
        --accent: #2563eb;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 1.5rem;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--text);
        background:
          radial-gradient(900px 420px at 10% 0%, rgba(37, 99, 235, 0.14), transparent 58%),
          linear-gradient(180deg, #f8fbff, var(--bg));
      }

      main {
        width: min(100%, 34rem);
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 1rem;
        padding: 1.4rem;
        box-shadow: 0 18px 48px rgba(15, 23, 42, 0.08);
      }

      h1 {
        margin: 0 0 0.5rem;
        font-size: 1.4rem;
      }

      p {
        margin: 0;
        color: var(--muted);
        line-height: 1.45;
      }

      a {
        display: inline-flex;
        margin-top: 1rem;
        padding: 0.7rem 1rem;
        border-radius: 999px;
        background: var(--accent);
        color: #fff;
        text-decoration: none;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Dashboard is offline</h1>
      <p>
        Cached apps still work, but this page was not available from the network.
        Reconnect once to refresh everything.
      </p>
      <a href="./index.html">Back to Dashboard</a>
    </main>
  </body>
</html>
