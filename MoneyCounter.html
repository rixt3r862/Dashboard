<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>CashBox</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <link rel="manifest" href="./app.webmanifest" />
  <script defer src="./shared/pwa.js" data-sw="./sw.js"></script>
  <script>
    (function () {
      try {
        const theme = localStorage.getItem("dash.theme");
        if (theme === "dark" || theme === "light") {
          document.documentElement.setAttribute("data-theme", theme);
        }
      } catch {}
    })();
  </script>
  <style>
    :root{
      --bg:#f6f8fb; --card:#fff; --text:#0f172a; --muted:#64748b; --line:#e5e7eb;
      --accent:#2563eb; --accent-2:#60a5fa; --success:#16a34a;
      --radius:16px; --shadow:0 8px 30px rgba(2,6,23,.08);
      --w: clamp(320px, 95vw, 1000px);
      --font-base: clamp(15px, 0.8vw + 14px, 16px);
      --font-sm: clamp(13px, 0.5vw + 12px, 14px);
      --font-lg: clamp(18px, 1vw + 16px, 22px);
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    @media (prefers-color-scheme: dark){
      :root{
        --bg:#0b1220; --card:#0f172a; --text:#e5e7eb; --muted:#9aa4b2; --line:#1f2a44;
        --accent:#60a5fa; --accent-2:#93c5fd; --shadow:0 10px 30px rgba(0,0,0,.35);
      }
    }
    :root[data-theme="light"]{
      --bg:#f6f8fb; --card:#fff; --text:#0f172a; --muted:#64748b; --line:#e5e7eb;
      --accent:#2563eb; --accent-2:#60a5fa; --shadow:0 8px 30px rgba(2,6,23,.08);
    }
    :root[data-theme="dark"]{
      --bg:#0b1220; --card:#0f172a; --text:#e5e7eb; --muted:#9aa4b2; --line:#1f2a44;
      --accent:#60a5fa; --accent-2:#93c5fd; --shadow:0 10px 30px rgba(0,0,0,.35);
    }

    *{ box-sizing:border-box }
    html,body{ height:auto; min-height:100dvh }
    body{
      margin:0;
      font-family: ui-sans-serif,-apple-system,system-ui,"Segoe UI",Roboto,Arial,"Helvetica Neue",Helvetica,sans-serif;
      font-size: var(--font-base);
      color: var(--text);
      background:
        radial-gradient(1000px 400px at 10% -10%, rgba(96,165,250,.20), transparent 60%),
        radial-gradient(900px 500px at 120% 10%, rgba(37,99,235,.12), transparent 60%),
        var(--bg);
      display:grid; place-items:center;
      padding:
        calc(var(--safe-top) + clamp(12px, 3vw, 24px))
        clamp(12px, 3vw, 24px)
        calc(var(--safe-bottom) + clamp(12px, 3vw, 24px));
    }
    @media (max-width: 768px){
      body{
        place-items: start center;
        padding-top: calc(var(--safe-top) + 64px);
      }
    }
    .back-link{
      position: fixed;
      top: max(12px, calc(var(--safe-top) + 8px));
      left: 12px;
      z-index: 10;
      padding: .45rem .75rem;
      border-radius: .6rem;
      border: 1px solid var(--line);
      background: var(--card);
      color: var(--text);
      text-decoration: none;
      font-size: .9rem;
    }
    .back-link:hover{ filter: brightness(.98); }

    .card{
      width:min(100%, var(--w));
      background:var(--card);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      overflow:hidden;
    }

    .header{
      display:flex; align-items:center; gap:.5rem;
      padding: clamp(8px, 1.5vw, 12px) clamp(12px, 2vw, 16px);
      border-bottom:1px solid var(--line);
      background:linear-gradient(180deg, rgba(37,99,235,.06), transparent 60%);
    }
    .logo{
      width: clamp(28px, 6vw, 36px);
      height: clamp(28px, 6vw, 36px);
      border-radius:8px; display:grid; place-items:center;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color:#fff; font-weight:800; font-size: var(--font-sm);
    }
    .title{ margin:0; font-size: var(--font-lg); line-height:1.1 }
    .subtitle{ margin:.2rem 0 0; color:var(--muted); font-size: var(--font-sm) }

    .content{
      padding: clamp(8px, 2vw, 12px) clamp(12px, 3vw, 16px) clamp(8px, 2vw, 12px);
      display: grid;
      gap: 1rem;
    }

    /* Two column layout for panels */
    .panel-grid{
      display: grid;
      grid-template-columns: 1fr;
      gap: 1rem;
    }
    @media (min-width: 768px){
      .panel-grid{ grid-template-columns: 1fr 1fr; }
    }

    .panel{
      border:1px solid var(--line);
      border-radius:12px;
      padding: clamp(8px, 2vw, 12px);
      background: linear-gradient(180deg, rgba(0,0,0,.02), transparent 70%);
    }
    .panel h2{
      margin:.25rem 0 .6rem; font-size:1.05rem;
      color: var(--muted); font-weight:700;
    }
    .panel-full{ grid-column:1 / -1; }

    .field-grid{
      display:grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap:.8rem;
    }
    .field{
      display:grid;
      gap:.35rem;
    }
    .field label{
      color:var(--muted);
      font-size: var(--font-sm);
      font-weight:600;
    }
    .field input[type="text"],
    .field input[type="date"],
    .field textarea,
    .summary input[type="number"]{
      width:100%;
      padding:.55rem .7rem;
      border:1px solid var(--line);
      border-radius:10px;
      background:transparent;
      color:inherit;
      font:inherit;
      outline:none;
    }
    .field input[type="text"]:focus,
    .field input[type="date"]:focus,
    .field textarea:focus,
    .summary input[type="number"]:focus{
      border-color: var(--accent);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 25%, transparent);
      background: color-mix(in srgb, var(--accent) 8%, transparent);
    }
    .field textarea{
      min-height: 5.5rem;
      resize: vertical;
    }
    .field--notes{ grid-column:1 / -1; }

    .print-header{ display:none; }
    .print-title{
      margin:0;
      font-size:1.15rem;
    }
    .print-meta{
      margin:.25rem 0 0;
      color:var(--muted);
      font-size: var(--font-sm);
    }
    .print-totals{
      display:grid;
      gap:.2rem;
      text-align:right;
    }
    .print-totals strong{
      font-size:1.15rem;
      font-variant-numeric: tabular-nums;
    }

    .helper-strip{
      display:flex;
      flex-wrap:wrap;
      gap:.5rem;
    }
    .chipbtn{
      appearance:none;
      border:1px solid var(--line);
      background: color-mix(in srgb, var(--card) 92%, transparent);
      color:var(--text);
      border-radius:999px;
      padding:.5rem .8rem;
      font:inherit;
      font-size: var(--font-sm);
      cursor:pointer;
    }
    .chipbtn:hover{ border-color: var(--accent); }

    table{
      width:100%; border-collapse:separate; border-spacing:0;
      border:1px solid var(--line); border-radius:12px; overflow:hidden;
      margin-bottom:.5rem;
    }
    thead th{
      background:linear-gradient(180deg,#dbeafe,#bfdbfe);
      color:#0b3b73; text-align:right;
      padding:.4rem .6rem;
      font-weight:700; font-size:.9rem;
      border-bottom:1px solid var(--line);
    }
    @media (prefers-color-scheme: dark){
      thead th{ background:linear-gradient(180deg,#0f2546,#0a1a33); color:#cfe3ff }
    }
    th:first-child, td:first-child{ text-align:center }
    td{
      padding:.4rem .6rem;
      border-bottom:1px solid var(--line);
    }
    tbody tr:nth-child(odd) td{ background: rgba(99,102,241,0.03) }
    tbody tr:last-child td{ border-bottom:none }
    tfoot td{
      padding:.5rem;
      font-weight:800; border-top:1px solid var(--line);
      background:linear-gradient(180deg, rgba(37,99,235,.05), transparent);
      text-align:right;
    }

    /* Safari dark mode: hide native steppers */
    input[type="number"]::-webkit-outer-spin-button,
    input[type="number"]::-webkit-inner-spin-button{
      -webkit-appearance: none;
      margin: 0;
    }
    input[type="number"]{
      -moz-appearance: textfield;
      width: clamp(5rem, 24vw, 7rem);
      padding:.35rem .5rem;
      border:1px solid var(--line); border-radius:10px;
      background:transparent; color:inherit; text-align:right;
      font-variant-numeric: tabular-nums; outline:none;
      font-size: clamp(1rem, 4vw, 1.1rem);
      -webkit-text-size-adjust: 100%;
    }
    input[type="number"]:focus{
      border-color: var(--accent);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 25%, transparent);
      background: color-mix(in srgb, var(--accent) 8%, transparent);
    }
    input[readonly]{
      width: clamp(6rem, 28vw, 9rem);
      border:none; background:transparent; color:inherit;
      text-align:right; font-weight:600;
      font-variant-numeric: tabular-nums;
    }

    /* Custom +/- controls for Cash counts */
    .numwrap{
      display:flex;
      justify-content:center;
      align-items:center;
      gap:.35rem;
    }
    .stepbtn{
      width: 2.1rem;
      height: 2.1rem;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: color-mix(in srgb, var(--card) 85%, transparent);
      color: var(--text);
      font-weight: 800;
      line-height: 1;
      cursor: pointer;
      user-select: none;
    }
    .stepbtn:active{ transform: translateY(1px); }

    @media (pointer: coarse){
      .stepbtn{ width: 2.4rem; height: 2.4rem; }
    }

    .summary{
      display:grid; gap:.4rem;
      grid-template-columns: 1fr auto;
      border:1px solid var(--line);
      border-radius:12px;
      padding: clamp(8px, 2vw, 12px);
      background: linear-gradient(180deg, rgba(0,0,0,.02), transparent 70%);
    }
    .summary label{ color:var(--muted); font-weight:600 }
    .summary output{
      font-weight:800; font-variant-numeric: tabular-nums;
      text-align:right;
    }
    .summary input[type="number"]{
      max-width: 12rem;
      justify-self:end;
      text-align:right;
      font-variant-numeric: tabular-nums;
    }
    .summary output.is-positive{ color: var(--success); }
    .summary output.is-negative{ color:#dc2626; }
    .summary output.summary-strong{ font-size:1.05rem; }

    .check-amount{ width:min(100%, 8rem) !important; }
    .check-actions{
      display:flex;
      justify-content:center;
      gap:.35rem;
    }
    .iconbtn{
      appearance:none;
      border:1px solid var(--line);
      background:transparent;
      color:inherit;
      border-radius:9px;
      padding:.35rem .55rem;
      font:inherit;
      font-size: var(--font-sm);
      cursor:pointer;
    }
    .iconbtn:hover{ border-color: var(--accent); }

    .actions{
      display:flex; gap:.6rem; justify-content:flex-end; align-items:center; flex-wrap:wrap;
      padding: clamp(8px, 2vw, 12px);
      border-top:1px solid var(--line);
      background: linear-gradient(180deg, transparent, rgba(0,0,0,.02));
    }
    .status-note{
      margin-right:auto;
      color:var(--muted);
      font-size: var(--font-sm);
    }
    .btn{
      appearance:none; border:none; cursor:pointer;
      padding:.5rem 1rem;
      border-radius:999px; font-weight:600;
    }
    .btn.primary{ background:linear-gradient(135deg,var(--accent),var(--accent-2)); color:#fff; }
    .btn.ghost{ background:transparent; color:var(--text); border:1px solid var(--line) }

@media print{
  :root,
  :root[data-theme="dark"],
  :root[data-theme="light"]{
    color-scheme: light !important;
    --bg:#fff !important;
    --card:#fff !important;
    --text:#000 !important;
    --muted:#444 !important;
    --line:#000 !important;
    --shadow:none !important;
  }

  @page{
    size: auto;
    margin: 12mm;
  }

  body{
    background:#fff !important;
    padding:0 !important;
    display:block !important;
  }

  .card{
    width: 100% !important;
    max-width: none !important;
    margin: 0 !important;
    border: none !important;
    border-radius: 0 !important;
    box-shadow: none !important;
    overflow: visible !important;
  }

  .content{
    padding: 0 !important;
    gap: 6mm !important;
  }
  .print-header{
    display:flex !important;
    justify-content:space-between;
    align-items:flex-start;
    gap:8mm;
    border-bottom: 1px solid #000;
    padding-bottom: 4mm;
    margin-bottom: 6mm;
  }
  .panel-grid{
    grid-template-columns: 1fr !important;
    gap: 6mm !important;
  }

  .panel{
    padding: 0 !important;
    border: none !important;
    background: none !important;
  }

  table{
    width: 100% !important;
    max-width: 100% !important;
    margin-bottom: 0 !important;
    border: 1px solid #000 !important;
  }

  thead th{
    background: #dbeafe !important;
    color: #0b3b73 !important;
  }

  .helper-panel,
  .status-note,
  .iconbtn,
  .chipbtn{
    display:none !important;
  }

  .checks-table th:last-child,
  .checks-table td:last-child{
    display:none !important;
  }

  .back-link, .header, .actions, .stepbtn{
    display:none !important;
  }

  input{
    border: none !important;
    box-shadow: none !important;
    background: transparent !important;
    color: #000 !important;
    padding: 0 !important;
  }

  textarea{
    border:none !important;
    resize:none !important;
    min-height:auto !important;
  }

  input[readonly]{
    font-weight: 700 !important;
  }

  .summary{
    break-inside: avoid;
    page-break-inside: avoid;
    border: 1px solid #000 !important;
  }
}
  </style>
</head>
<body>
  <a class="back-link" href="./index.html">Back to Dashboard</a>
  <main class="card">
    <header class="header">
      <div class="logo">¢$</div>
      <div>
        <h1 class="title">CashBox</h1>
        <p class="subtitle">Get those deposits ready!</p>
      </div>
    </header>

    <section class="content">
      <form id="moneyForm" autocomplete="off">
        <section class="print-header" aria-hidden="true">
          <div>
            <h2 class="print-title">CashBox Deposit Summary</h2>
            <p class="print-meta" id="printMetaLine"></p>
          </div>
          <div class="print-totals">
            <span>Total Counted</span>
            <strong id="printTotal">$0.00</strong>
            <span id="printDifference">$0.00 difference</span>
          </div>
        </section>

        <section class="panel panel-full">
          <h2>Deposit Info</h2>
          <div class="field-grid">
            <div class="field">
              <label for="depositDate">Deposit Date</label>
              <input type="date" id="depositDate" data-persist />
            </div>
            <div class="field">
              <label for="depositAccount">Account Number</label>
              <input type="text" id="depositAccount" placeholder="Account number" data-persist />
            </div>
            <div class="field field--notes">
              <label for="depositNotes">Notes</label>
              <textarea id="depositNotes" rows="3" placeholder="Optional notes for this deposit" data-persist></textarea>
            </div>
          </div>
        </section>

        <section class="panel panel-full helper-panel">
          <h2>Quick Add</h2>
          <div class="helper-strip" id="quickAdd">
            <button type="button" class="chipbtn" data-denom="pny" data-add="50">Penny Roll +50</button>
            <button type="button" class="chipbtn" data-denom="nck" data-add="40">Nickel Roll +40</button>
            <button type="button" class="chipbtn" data-denom="dme" data-add="50">Dime Roll +50</button>
            <button type="button" class="chipbtn" data-denom="qtr" data-add="40">Quarter Roll +40</button>
            <button type="button" class="chipbtn" data-denom="one" data-add="25">$1 Strap +25</button>
            <button type="button" class="chipbtn" data-denom="fiv" data-add="20">$5 Strap +20</button>
            <button type="button" class="chipbtn" data-denom="ten" data-add="10">$10 Strap +10</button>
            <button type="button" class="chipbtn" data-denom="twe" data-add="5">$20 Strap +5</button>
          </div>
        </section>

        <div class="panel-grid">
          <!-- Cash panel -->
          <section class="panel">
            <h2>Cash</h2>
            <table>
              <thead><tr><th>Count</th><th>Denomination</th><th>Total</th></tr></thead>
              <tbody id="cash-rows"></tbody>
              <tfoot><tr><td></td><td>Cash Total</td><td><input id="grandTotalCash" readonly tabindex="-1" /></td></tr></tfoot>
            </table>
          </section>

          <!-- Checks panel -->
          <section class="panel">
            <h2>Checks</h2>
            <table class="checks-table">
              <thead><tr><th>#</th><th>Amount</th><th>Formatted</th><th>Actions</th></tr></thead>
              <tbody id="check-rows"></tbody>
              <tfoot><tr><td></td><td>Checks Total</td><td><input id="checksTotal" readonly tabindex="-1" /></td><td></td></tr></tfoot>
            </table>
          </section>
        </div>

        <!-- Summary below the two columns -->
        <section class="summary">
          <label>Cash</label><output id="summaryCash">$0.00</output>
          <label>Checks</label><output id="summaryChecks">$0.00</output>
          <label>Total (Cash + Checks)</label><output id="summaryBoth" class="summary-strong">$0.00</output>
          <label for="expectedTotal">Expected Total</label><input id="expectedTotal" type="number" min="0" step="0.01" inputmode="decimal" placeholder="0.00" data-persist />
          <label>Difference</label><output id="summaryDifference">$0.00</output>
        </section>

        <div class="actions">
          <span class="status-note" id="saveStatus">Draft stays saved on this device.</span>
          <button type="button" class="btn ghost" id="copySummaryBtn">Copy Summary</button>
          <button type="button" class="btn primary" id="printBtn">Print</button>
          <button type="reset" class="btn ghost">Reset</button>
        </div>
      </form>
    </section>
  </main>

  <script>
    const usd = new Intl.NumberFormat("en-US",{style:"currency",currency:"USD"});
    const toUsd=c=>usd.format(c/100);
    const formatSignedUsd=c=>`${c<0?"-":""}${usd.format(Math.abs(c)/100)}`;
    const STORAGE_KEY="cashbox.form.v1";
    const parseMoneyToCents=s=>{
      if(!s)return 0;
      const c=String(s).replace(/[^\d.]/g,"");
      if(!c)return 0;
      const p=c.split(".");
      let n=0;
      if(p.length===1) n=parseInt(p[0])*100;
      else{
        const w=parseInt(p[0]||"0");
        const f=(p[1]||"0").slice(0,2).padEnd(2,"0");
        n=w*100+parseInt(f);
      }
      return isNaN(n)?0:n
    };

    const DENOMS=[
      {key:"pny",label:"1¢",cents:1},
      {key:"nck",label:"5¢",cents:5},
      {key:"dme",label:"10¢",cents:10},
      {key:"qtr",label:"25¢",cents:25},
      {key:"hlf",label:"50¢",cents:50},
      {key:"one",label:"$1.00",cents:100},
      {key:"two",label:"$2.00",cents:200},
      {key:"fiv",label:"$5.00",cents:500},
      {key:"ten",label:"$10.00",cents:1000},
      {key:"twe",label:"$20.00",cents:2000},
      {key:"fif",label:"$50.00",cents:5000},
      {key:"hun",label:"$100.00",cents:10000}
    ];

    const moneyForm=document.getElementById("moneyForm");
    const cashTbody=document.getElementById("cash-rows");
    const checkTbody=document.getElementById("check-rows");
    const depositDateEl=document.getElementById("depositDate");
    const depositAccountEl=document.getElementById("depositAccount");
    const depositNotesEl=document.getElementById("depositNotes");
    const cashTotalEl=document.getElementById("grandTotalCash");
    const checksTotalEl=document.getElementById("checksTotal");
    const summaryCash=document.getElementById("summaryCash");
    const summaryChecks=document.getElementById("summaryChecks");
    const summaryBoth=document.getElementById("summaryBoth");
    const expectedTotalEl=document.getElementById("expectedTotal");
    const summaryDifference=document.getElementById("summaryDifference");
    const quickAddEl=document.getElementById("quickAdd");
    const saveStatusEl=document.getElementById("saveStatus");
    const printMetaLine=document.getElementById("printMetaLine");
    const printTotal=document.getElementById("printTotal");
    const printDifference=document.getElementById("printDifference");
    const copySummaryBtn=document.getElementById("copySummaryBtn");
    const printBtn=document.getElementById("printBtn");
    let totalsState={cash:0,checks:0,total:0,expected:0,difference:0};

    // Build cash rows WITH +/- buttons
    DENOMS.forEach(d=>{
      const tr=document.createElement("tr");

      const tdCount=document.createElement("td");
      tdCount.style.textAlign="center";

      const wrap=document.createElement("div");
      wrap.className="numwrap";

      const minus=document.createElement("button");
      minus.type="button";
      minus.className="stepbtn";
      minus.textContent="−";
      minus.setAttribute("aria-label",`Decrease ${d.label}`);

      const input=document.createElement("input");
      input.type="number";
      input.min="0";
      input.step="1";
      input.inputMode="numeric";
      input.id=d.key;

      const plus=document.createElement("button");
      plus.type="button";
      plus.className="stepbtn";
      plus.textContent="+";
      plus.setAttribute("aria-label",`Increase ${d.label}`);

      minus.addEventListener("click",()=>{
        const v=parseInt(input.value||"0",10);
        if(v>0) input.value=String(v-1);
        input.dispatchEvent(new Event("input",{bubbles:true}));
      });
      plus.addEventListener("click",()=>{
        const v=parseInt(input.value||"0",10);
        input.value=String(v+1);
        input.dispatchEvent(new Event("input",{bubbles:true}));
      });

      wrap.append(minus,input,plus);
      tdCount.appendChild(wrap);

      const tdDen=document.createElement("td");
      tdDen.style.textAlign="right";
      tdDen.textContent=d.label;

      const tdTot=document.createElement("td");
      tdTot.style.textAlign="right";
      tdTot.innerHTML=`<input id="${d.key}Tot" readonly tabindex="-1">`;

      tr.append(tdCount,tdDen,tdTot);
      cashTbody.appendChild(tr);
    });

    let checkCount=0;
    function addCheckRow(value=""){
      checkCount++;
      const tr=document.createElement("tr");
      tr.innerHTML=`<td class="check-index">${checkCount}</td>
        <td><input class="check-amount" type="number" step="0.01" inputmode="decimal" id="chk_${checkCount}" placeholder="0.00" value="${value}"></td>
        <td style="text-align:right"><input id="chk_${checkCount}_fmt" readonly tabindex="-1"></td>
        <td><div class="check-actions"><button type="button" class="iconbtn" data-check-action="clear">Clear</button><button type="button" class="iconbtn" data-check-action="remove">Remove</button></div></td>`;
      checkTbody.appendChild(tr);
    }

    function renumberCheckRows(){
      [...checkTbody.querySelectorAll("tr")].forEach((row,index)=>{
        const cell=row.querySelector(".check-index");
        if(cell) cell.textContent=String(index+1);
      });
    }

    function ensureExtraCheckRow(){
      const inputs=checkTbody.querySelectorAll(".check-amount");
      if(inputs.length===0||inputs[inputs.length-1].value.trim()!=="") addCheckRow();
      renumberCheckRows();
    }

    function calcCash(){
      let c=0;
      DENOMS.forEach(d=>{
        const v=parseInt(document.getElementById(d.key).value||0,10);
        const s=v*d.cents; c+=s;
        document.getElementById(`${d.key}Tot`).value=s?toUsd(s):"";
      });
      cashTotalEl.value=toUsd(c);
      return c;
    }

    function calcChecks(){
      let c=0;
      const inputs=checkTbody.querySelectorAll(".check-amount");
      inputs.forEach(inp=>{
        const cents=parseMoneyToCents(inp.value.trim());
        c+=cents;
        document.getElementById(`${inp.id}_fmt`).value=cents?toUsd(cents):"";
      });
      checksTotalEl.value=toUsd(c);
      return c;
    }

    function formatPrintDate(value){
      if(!value) return "No deposit date";
      const parts=value.split("-");
      if(parts.length!==3) return value;
      const [year,month,day]=parts;
      return new Date(Number(year), Number(month)-1, Number(day)).toLocaleDateString("en-US",{
        year:"numeric",
        month:"short",
        day:"numeric"
      });
    }

    function syncPrintHeader(){
      const account=depositAccountEl.value.trim()||"No account number";
      const printedAt=new Date().toLocaleString("en-US",{dateStyle:"medium",timeStyle:"short"});
      printMetaLine.textContent=`Account ${account} | ${formatPrintDate(depositDateEl.value)} | Printed ${printedAt}`;
      printTotal.textContent=toUsd(totalsState.total);
      printDifference.textContent=expectedTotalEl.value.trim()?`${formatSignedUsd(totalsState.difference)} difference`:"Expected total not set";
    }

    function updateSaveStatus(message){
      saveStatusEl.textContent=message;
    }

    function getSerializedChecks(){
      const values=[...checkTbody.querySelectorAll(".check-amount")].map(input=>input.value.trim());
      let lastFilled=-1;
      values.forEach((value,index)=>{
        if(value!=="") lastFilled=index;
      });
      const keepCount=Math.max(1, Math.min(values.length, lastFilled+2));
      return values.slice(0, keepCount);
    }

    function saveDraft(){
      try{
        const state={
          depositDate: depositDateEl.value,
          depositAccount: depositAccountEl.value,
          depositNotes: depositNotesEl.value,
          expectedTotal: expectedTotalEl.value,
          cash: Object.fromEntries(DENOMS.map(d=>[d.key, document.getElementById(d.key).value])),
          checks: getSerializedChecks()
        };
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        updateSaveStatus(`Draft saved ${new Date().toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"})}.`);
      }catch{
        updateSaveStatus("Unable to save draft on this device.");
      }
    }

    function clearDraft(){
      try{ localStorage.removeItem(STORAGE_KEY); }catch{}
      updateSaveStatus("Draft cleared.");
    }

    function restoreDraft(){
      try{
        const raw=localStorage.getItem(STORAGE_KEY);
        if(!raw) return false;
        const state=JSON.parse(raw);
        depositDateEl.value=state.depositDate||"";
        depositAccountEl.value=state.depositAccount||"";
        depositNotesEl.value=state.depositNotes||"";
        expectedTotalEl.value=state.expectedTotal||"";
        DENOMS.forEach(d=>{
          document.getElementById(d.key).value=state.cash?.[d.key]||"";
        });
        checkTbody.innerHTML="";
        checkCount=0;
        const checks=Array.isArray(state.checks)&&state.checks.length?state.checks:[""];
        checks.forEach(value=>addCheckRow(value));
        ensureExtraCheckRow();
        calcAll();
        updateSaveStatus("Draft restored.");
        return true;
      }catch{
        updateSaveStatus("Saved draft could not be restored.");
        return false;
      }
    }

    function setDefaultDepositDate(){
      if(!depositDateEl.value){
        const today=new Date();
        depositDateEl.value=[
          today.getFullYear(),
          String(today.getMonth()+1).padStart(2,"0"),
          String(today.getDate()).padStart(2,"0")
        ].join("-");
      }
    }

    function buildSummaryText(){
      const lines=[
        `Cash: ${toUsd(totalsState.cash)}`,
        `Checks: ${toUsd(totalsState.checks)}`,
        `Total: ${toUsd(totalsState.total)}`,
        `Expected: ${expectedTotalEl.value.trim()?toUsd(totalsState.expected):"Not set"}`,
        `Difference: ${expectedTotalEl.value.trim()?formatSignedUsd(totalsState.difference):"Not set"}`
      ];
      if(depositDateEl.value) lines.unshift(`Deposit Date: ${formatPrintDate(depositDateEl.value)}`);
      if(depositAccountEl.value.trim()) lines.unshift(`Account Number: ${depositAccountEl.value.trim()}`);
      if(depositNotesEl.value.trim()) lines.push(`Notes: ${depositNotesEl.value.trim()}`);
      return lines.join("\n");
    }

    function calcAll(){
      const hasExpected=expectedTotalEl.value.trim()!=="";
      const cash=calcCash(),checks=calcChecks(),total=cash+checks,expected=parseMoneyToCents(expectedTotalEl.value.trim()),difference=total-expected;
      totalsState={cash,checks,total,expected,difference};
      summaryCash.textContent=toUsd(cash);
      summaryChecks.textContent=toUsd(checks);
      summaryBoth.textContent=toUsd(total);
      summaryDifference.textContent=hasExpected?formatSignedUsd(difference):"$0.00";
      summaryDifference.classList.toggle("is-positive", hasExpected&&difference>0);
      summaryDifference.classList.toggle("is-negative", hasExpected&&difference<0);
      syncPrintHeader();
    }

    function getEditableInputs(){
      return [...moneyForm.querySelectorAll('input[type="number"]:not([readonly])')];
    }

    moneyForm.addEventListener("keydown",e=>{
      if(e.key!=="Enter"||!e.target.matches('input[type="number"]:not([readonly])')) return;
      e.preventDefault();

      if(e.target.closest("#check-rows")&&e.target.value.trim()!=="") ensureExtraCheckRow();

      const inputs=getEditableInputs();
      const next=inputs[inputs.indexOf(e.target)+1];

      if(next){
        next.focus();
        next.select?.();
      }else{
        e.target.blur();
      }
    });

    quickAddEl.addEventListener("click",e=>{
      const btn=e.target.closest("[data-denom]");
      if(!btn) return;
      const input=document.getElementById(btn.dataset.denom);
      const nextValue=parseInt(input.value||"0",10)+parseInt(btn.dataset.add||"0",10);
      input.value=String(nextValue);
      input.dispatchEvent(new Event("input",{bubbles:true}));
      input.focus();
      input.select?.();
    });

    checkTbody.addEventListener("click",e=>{
      const btn=e.target.closest("[data-check-action]");
      if(!btn) return;
      const row=btn.closest("tr");
      const input=row?.querySelector(".check-amount");
      if(!row||!input) return;

      if(btn.dataset.checkAction==="clear"){
        input.value="";
        input.dispatchEvent(new Event("input",{bubbles:true}));
        input.focus();
        return;
      }

      row.remove();
      if(!checkTbody.querySelector("tr")) addCheckRow();
      ensureExtraCheckRow();
      calcAll();
      saveDraft();
    });

    moneyForm.addEventListener("input",e=>{
      if(e.target.matches('#cash-rows input')) calcAll();
      if(e.target.matches('.check-amount')){
        ensureExtraCheckRow();
        calcAll();
      }
      if(e.target.matches('#expectedTotal')) calcAll();
      if(e.target.matches('[data-persist]')) syncPrintHeader();
      if(e.target.matches('#cash-rows input, .check-amount, #expectedTotal, [data-persist]')) saveDraft();
    });

    copySummaryBtn.addEventListener("click",async()=>{
      const text=buildSummaryText();
      try{
        await navigator.clipboard.writeText(text);
        updateSaveStatus("Summary copied to clipboard.");
      }catch{
        updateSaveStatus("Clipboard copy was blocked.");
      }
    });

    printBtn.addEventListener("click",()=>{
      syncPrintHeader();
      window.print();
    });

    window.addEventListener("beforeprint",syncPrintHeader);

    moneyForm.addEventListener("reset",()=>{
      setTimeout(()=>{
        cashTbody.querySelectorAll('input[type="number"]').forEach(i=>i.value="");
        checkTbody.innerHTML="";
        checkCount=0;
        addCheckRow();
        setDefaultDepositDate();
        syncPrintHeader();
        calcAll();
        clearDraft();
      },0);
    });

    window.addEventListener("DOMContentLoaded",()=>{
      const restored=restoreDraft();
      if(!restored){
        setDefaultDepositDate();
        addCheckRow();
        calcAll();
        saveDraft();
      }
      syncPrintHeader();
    });
  </script>
</body>
</html>
